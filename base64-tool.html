<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Base64 Converter | DevDrop</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-[#0A0A0A] text-white font-sans antialiased selection:bg-blue-500 selection:text-white min-h-screen flex flex-col">
    
    <nav class="flex justify-between items-center px-8 py-6 border-b border-white/10">
        <a href="index.html" class="font-bold text-xl tracking-tighter flex items-center gap-2 hover:text-blue-400 transition-colors">
            <div class="w-5 h-5 rounded-full border-[3px] border-white/80"></div> 
            DevDrop
        </a>
        <div class="text-sm font-semibold text-gray-400">Base64 Converter</div>
    </nav>

    <main class="flex-grow flex flex-col p-6 max-w-7xl w-full mx-auto">
        
        <a href="index.html" class="inline-flex items-center gap-2 text-sm text-gray-400 hover:text-white mb-6 transition-colors w-fit group">
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="group-hover:-translate-x-1 transition-transform"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
            Back to Home
        </a>

        <div class="mb-6 flex justify-between items-end">
            <div>
                <h1 class="text-3xl font-bold mb-2">Base64 Converter</h1>
                <p class="text-gray-400 text-sm">Instantly encode or decode text to and from Base64 format.</p>
            </div>
            
            <div class="flex gap-3">
                <button id="btnEncode" class="px-5 py-2 text-sm font-semibold text-black bg-blue-400 rounded-lg hover:bg-blue-300 transition-colors shadow-lg shadow-blue-500/20">
                    Encode →
                </button>
                <button id="btnDecode" class="px-5 py-2 text-sm font-semibold text-white bg-blue-500/10 border border-blue-500/20 rounded-lg hover:bg-blue-500/20 text-blue-400 transition-colors">
                    ← Decode
                </button>
                <button id="btnClear" class="px-5 py-2 text-sm font-semibold text-white bg-red-500/10 border border-red-500/20 rounded-lg hover:bg-red-500/20 text-red-400 transition-colors">
                    Clear
                </button>
            </div>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-6 flex-grow">
            
            <div class="flex flex-col h-full min-h-[500px]">
                <div class="bg-[#1E1E1E] px-4 py-2 rounded-t-xl border border-white/10 border-b-0 text-xs font-mono text-gray-400 flex justify-between">
                    <span>Text String</span>
                    <button id="btnCopyText" class="hover:text-white transition-colors">Copy 📋</button>
                </div>
                <textarea id="textInput" class="w-full h-full flex-grow bg-[#161616] border border-white/10 rounded-b-xl p-4 font-mono text-sm text-gray-300 focus:outline-none focus:border-blue-500/50 focus:ring-1 focus:ring-blue-500/50 resize-none" placeholder="Type or paste normal text here..."></textarea>
            </div>

            <div class="flex flex-col h-full min-h-[500px]">
                <div class="bg-[#1E1E1E] px-4 py-2 rounded-t-xl border border-white/10 border-b-0 flex justify-between items-center text-xs font-mono text-gray-400">
                    <span>Base64 String</span>
                    <button id="btnCopyBase64" class="hover:text-white transition-colors">Copy 📋</button>
                </div>
                <textarea id="base64Input" class="w-full h-full flex-grow bg-[#0f0f0f] border border-white/10 rounded-b-xl p-4 font-mono text-sm text-blue-400 focus:outline-none focus:border-blue-500/50 focus:ring-1 focus:ring-blue-500/50 resize-none" placeholder="SGVsbG8gV29ybGQh (Base64 will appear here)"></textarea>
            </div>

        </div>
        
        <div id="errorMessage" class="hidden mt-4 p-3 bg-red-500/10 border border-red-500/50 text-red-400 rounded-lg text-sm font-mono">
            Error: Invalid Base64 string!
        </div>
        
    </main>

    <script src="base64-tool.js"></script>
</body>
</html>
